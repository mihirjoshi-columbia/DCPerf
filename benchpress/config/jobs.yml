    - hook: cpu-mpstat
      options:
        args:
          - '-u'   # utilization
          - '1'    # second interval
    - hook: copymove
      options:
        is_move: true
        after:
          - 'benchmarks/video_transcode_bench/video_transcode_bench_results.txt'
          - 'benchmarks/video_transcode_bench/perf.data'
          - 'benchmarks/video_transcode_bench/breakdown.csv'

- benchmark: health_check
  name: health_check
  description: Default run for health_check
  roles:
    server:
      args:
        - -r server
        - '-c {clients}'
      vars:
        - 'clients'
    client:
      args:
        - '-r client'

- benchmark: sleep
  name: sleep
  description: >
    Sleep for a period of time. Can be used to leverage Benchpress's Perf
    Monitoring Hook to monitor some external workloads.
  args:
    - '{duration}'
  vars:
    - 'duration'
