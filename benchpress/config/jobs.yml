- benchmark: django_workload
  name: django_workload_default
  description: Default run for django-workload
  tee_output: true
  roles:
    clientserver:
      args:
        - '-r clientserver'
        - '-d {duration}'
        - '-i {iterations}'
        - '-p {reps}'
        - '-l ./siege.log'
        - '-s urls.txt'
        - '-c {db_addr}'
        - '--interpreter {interpreter}'
        - '--use-async {use_async}'
        - '--base-port {base_port}'
        - '-T {stats_port}'
        - '--use-jit {use_jit}'
        - '--skip-datagen {skip_datagen}'
      vars:
        - 'db_addr'
        - 'duration=5M'
        - 'iterations=7'
        - 'reps=0'
        - 'interpreter=cinder'
        - 'use_async=1'
        - 'base_port=16668'
        - 'stats_port=8001'
        - 'use_jit=1'
        - 'skip_datagen=0'
    db:
      args:
        - '-r db'
        - '-b {bind_ip}'
        - '--thrift-server-workers {thrift_server_workers}'
      vars:
        - 'bind_ip=default'
        - 'thrift_server_workers=32'
    server:
      args:
        - '-r server'
        - '-c {db_addr}'
        - '--interpreter {interpreter}'
        - '--use-async {use_async}'
        - '--base-port {base_port}'
        - '-T {stats_port}'
        - '--use-jit {use_jit}'
        - '--skip-datagen {skip_datagen}'
      vars:
        - 'db_addr'
        - 'interpreter=cinder'
        - 'use_async=1'
        - 'base_port=16668'
        - 'stats_port=8001'
        - 'use_jit=1'
        - 'skip_datagen=0'
    standalone:
      args:
        - '-r standalone'
        - '-d {duration}'
        - '-i {iterations}'
        - '-p {reps}'
        - '-l ./siege.log'
        - '-s urls.txt'
        - '-c 127.0.0.1'
        - '--interpreter {interpreter}'
        - '--use-async {use_async}'
        - '--base-port {base_port}'
        - '-T {stats_port}'
        - '--use-jit {use_jit}'
        - '--thrift-server-workers {thrift_server_workers}'
        - '--skip-datagen {skip_datagen}'
      vars:
        - 'duration=5M'
        - 'iterations=7'
        - 'reps=0'
        - 'interpreter=cinder'
        - 'use_async=1'
        - 'base_port=16668'
        - 'stats_port=8001'
        - 'use_jit=1'
        - 'thrift_server_workers=32'
        - 'skip_datagen=0'
  hooks:
    - hook: copymove
      options:
        is_move: true
        after:
          - 'benchmarks/django_workload/django-workload/client/perf.data'
          - 'benchmarks/django_workload/django-workload/django-workload/*.log'
          - 'benchmarks/django_workload/django-workload/django-workload/log_load_balancer'
          - 'benchmarks/django_workload/django-workload/client/*.log'
          - 'benchmarks/django_workload/*.log'
          - '/tmp/wrk_out_*'
          - 'benchmarks/django_workload/breakdown.csv'

