- benchmark: adsim
  name: adsim
  description: Configurable Benchmark for AdServing Services
  roles:
    server:
      args:
        - 'server'
        - '--cfg-file {cfg_file}'
        - '--timeout {timeout}'
      vars:
        - 'cfg_file=default'
        - 'timeout=0'
    client:
      args:
        - 'client'
        - '--server {server_ip}'
        - '--port 10086'
        - '--workers {num_workers}'
        - '--runtime {runtime}'
        - '--criteria {criteria}'
        - '--latency {lat_target_ms}'
        - '--timeout {timeout}'
      vars:
        - 'server_ip'
        - 'num_workers=20'
        - 'runtime=120'
        - 'criteria=P95'
        - 'lat_target_ms=989'
        - 'timeout=1800'


- benchmark: adsim
  name: adsim_inference_a
  description: Benchmark for Model Inference Workload
  roles:
    server:
      args:
        - 'server'
        - '--auto-config-type {config_type}'
        - '--auto-config-model {config_model}'
        - '--timeout {timeout}'
      vars:
        - 'config_type=inference'
        - 'config_model=model_a'
        - 'timeout=0'
    client:
      args:
        - 'client'
        - '--server {server_ip}'
        - '--port 10086'
        - '--workers {num_workers}'
        - '--runtime {runtime}'
        - '--criteria {criteria}'
        - '--latency {lat_target_ms}'
        - '--timeout {timeout}'
        - '--mode ai'
        - '--ai-request-size-multiplier {request_size_multiplier}'
      vars:
        - 'server_ip'
        - 'num_workers=20'
        - 'runtime=120'
        - 'criteria=P99'
        - 'lat_target_ms=100'
        - 'timeout=1800'
        - 'request_size_multiplier=6'

- benchmark: type_conversion
  name: type_conversion
  description: Benchmark for common AI data type conversion
  args:
    - '--benchmark_format=json'

- benchmark: pytorch_gemm_gpuless
  name: pytorch_gemm_gpuless_stage1
  description: GPU-less torch.mm dispatch overhead via TorchDispatchMode (no CUDA needed).
  args:
    - stage1
    - '-m {m}'
    - '-n {n}'
    - '-k {k}'
    - '-t {dtype}'
    - '--steps {steps}'
    - '--warmups {warmups}'
    - '--gpu-model {gpu_model}'
    - '--efficiency {efficiency}'
    - '--no-sleep'
  vars:
    - 'm=1024'
