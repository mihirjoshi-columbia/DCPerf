- name: folly_single_core
  benchmark: wdl_bench
  description: >
    folly libraries and functions (using single core). Compute intensive.
  args:
    - '--type {type}'
    - '--output {output}'
    - '--window {window}'
  vars:
    - 'type=single_core'
    - 'output=wdl_bench_results.txt'
    - 'window=0'
  hooks:
    - hook: cpu-mpstat
      options:
        args:
          - '-u'   # utilization
          - '1'    # second interval
    - hook: copymove
      options:
        is_move: true
        after:
          - 'benchmarks/wdl_bench/wdl_bench_results.txt'
          - 'benchmarks/wdl_bench/out_*.json'

